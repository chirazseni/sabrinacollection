<!DOCTYPE html>

<head>

    <title>Finaliser la commande | sabrina collection </title>
    <link rel="stylesheet" href="style.css"> <style>

        <input type="text" id="commune" placeholder="Commune" required>
        <input type="text" id="address" placeholder="Adresse complète" required>
        
        <select id="delivery-type" required>
            <option value="Domicile">Livraison à domicile</option>
            <option value="Bureau">Livraison au bureau/point relais</option>
        </select>

        <button type="submit" class="btn" style="margin-top:20px;">Confirmer la commande</button>
    </form>
</div>

<script>
    const API_URL = 'https://my-store-vdd4.onrender.com';

    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    document.getElementById('total-price').innerText = total.toLocaleString() + " DA";

    document.getElementById('checkout-form').onsubmit = async (e) => {
        e.preventDefault();

        const newOrder = {
            clientName: document.getElementById('name').value,
            clientPhone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            wilaya: document.getElementById('wilaya').value,
            commune: document.getElementById('commune').value,
            address: document.getElementById('address').value,
            deliveryType: document.getElementById('delivery-type').value,
            items: cart,
            totalPrice: total,
            status: "En cours"
        };

        await fetch(`${API_URL}/orders`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newOrder)
        });

        localStorage.removeItem('cart');

        alert("Merci ! Votre commande est bien enregistrée.");
        window.location.href = "index.html";
    };
</script>

</body>
</html>
